spring.application.name: back-smart-beauty-manager

spring:
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5431/db_smart_beauty_manager}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver

spring.jpa:
  hibernate.ddl-auto: validate
  properties:
    hibernate:
      dialect: org.hibernate.dialect.PostgreSQLDialect
      format_sql: true
  show-sql: false

jwt:
  secret: ${JWT_SECRET:mySecretKeyForLocalDevelopmentOnlyChangeInProduction}
  expiration: 86400000
